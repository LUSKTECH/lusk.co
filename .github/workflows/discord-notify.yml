name: Discord Notifications

on:
  pull_request:
    types: [opened, closed, reopened]
  workflow_run:
    workflows: [CI, Security, Code Quality]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  notify-pr:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    uses: LUSKTECH/.github/.github/workflows/discord-pr.yml@main
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

  notify-failure:
    permissions:
      contents: read
      actions: read
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch
    uses: LUSKTECH/.github/.github/workflows/discord-workflow-failure.yml@main
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
